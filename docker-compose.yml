services:
  db:
    # image: mysql:9.6.0
    image: mariadb:10.11.10
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Admin@12345
      MYSQL_DATABASE: habitatpro
      MYSQL_USER: habitatpro
      MYSQL_PASSWORD: Admin@12345
    ports:
      - "33061:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: